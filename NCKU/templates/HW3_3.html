{% load static %}

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>技術指標</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="{% static 'css/HW3_3.css' %}" />
    <!-- 引入 Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/stock/modules/stock.js"></script>
    <script src="https://code.highcharts.com/stock/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/stock/modules/accessibility.js"></script>
    <script src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/1.11.5/css/jquery.dataTables.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/responsive/2.5.1/css/responsive.dataTables.min.css"
    />
    <script src="https://cdn.datatables.net/responsive/2.5.1/js/dataTables.responsive.min.js"></script>
  </head>
  <body>
    <script src="{% static 'js/HW3_3.js' %}"></script>
    <!-- 引入 Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <div id="container_input">
      <h3>Method</h3>
      <form id="inductorForm" onsubmit="return false;">
        <div>
          <label for="stockInductor" class="form-label">Stock_inductor</label>
          <input type="text" class="form-control" id="stockInductor" />
        </div>
        <div class="row">
          <div>
            <label for="startDateInductor" class="form-label"
              >Start_date_inductor</label
            >
            <input type="date" class="form-control" id="startDateInductor" />
          </div>
          <div>
            <label for="endDateInductor" class="form-label"
              >End_date_inductor</label
            >
            <input type="date" class="form-control" id="endDateInductor" />
          </div>
          <div>
            <label for="d_num" class="form-label">d</label>
            <input type="number" class="form-control" id="d_num" />
          </div>
        </div>
        <button type="submit" id="submitButton">Submit</button>
      </form>
      <!-- 隨便先寫的 -->
      <table class="result" id="result"></table>
      <div id="Historical"></div>
      <div id="MACD"></div>
      <div id="RSI"></div>
      <div id="KD"></div>
      <div id="ADX_DMI"></div>
      <div id="Star"></div>
      <div id="Three"></div>
      <div id="Engufing"></div>
    </div>
  </body>
</html>
