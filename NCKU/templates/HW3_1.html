{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本益比河流圖</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="{% static 'css/HW3_1.css' %}" />
    <!-- 引入 Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- <script src="https://code.highcharts.com/highcharts.js"></script> -->
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>
    <script src="https://code.highcharts.com/stock/highstock.js"></script>

</head>
<body>
    <div class="container">
        <h1>本益比河流圖</h1>
        <form onsubmit="return false;">
            <div class="form-row">
                <div class="form-group">
                    <label for="id">股票代碼&名稱:</label>
                    <input type="text" id="id" name="stock">
                </div>
                <div class="form-group">
                    <label for="range">選擇範圍:</label>
                    <select id="range" name="time-range">
                        <option value="MONTH">月</option>
                        <option value="QUAR">季</option>
                        <option value="YEAR">年</option>
                    </select>
                </div>
            </div>
            <button id="btn_submit">搜尋</button>
        </form>
    </div>
    <div class="result" >最新價格：<span id="result"></span></div>

    <!-- 長條圖 -->
    
    <figure class="highcharts-figure">
        <div id="container_barchart"></div>
    </figure>

    <!-- 蠟燭圖 -->
    <div id="container_candlestick"></div>

    <!-- 表格 -->
    <div class="container mt-4">   
        <div class="accordion" id="accordionExample">
            <!-- 本益比河流圖摺疊面板 -->
            <div class="accordion-item">
                <h2 class="accordion-header" id="headingOne">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne" aria-expanded="false" aria-controls="collapseOne">
                        本益比河流圖
                    </button>
                </h2>
                <div id="collapseOne" class="accordion-collapse collapse" aria-labelledby="headingOne">
                    <div class="accordion-body">
                        <p>將歷史本益比最高到最低區間平分為4份共7個區間, 再分別乘上EPS估算股價</p>
                        <p>股價 = EPS x 本益比，越接近底部越便宜，反之越貴</p>
                        <div class="alert alert-warning">便宜價 = EPS(<span id="normal_eps"></span>) x <span id="normal_ratio"></span> = <span id="normal_price"></span></div>
                        <div class="alert alert-success">合理價 = EPS(<span id="current_eps"></span>) x <span id="current_ratio"></span> = <span id="current_price"></div>
                        <div class="alert alert-danger">昂貴價 = EPS(<span id="expensive_eps"></span>) x <span id="expensive_ratio"></span> = <span id="expensive_price"></span></div>
                        <div id="evaluate-1">評價: 合理價(<span id="normal_price_final"></span>)< 目前價格(<span id="current_price_final"></span>) < 昂貴價(<span id="expensive_price_final"></span>)</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="{% static 'js/HW3_1.js' %}"></script>
    <!-- 引入 Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
