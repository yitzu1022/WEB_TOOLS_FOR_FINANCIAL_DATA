{% load static %} {% block title %}Day3{% endblock %} {% block content %}
<style>
  #container {
    height: 600px;
    min-width: 310px;
  }
</style>
<script>
  csrf_token = "{{ csrf_token }}";
</script>

<button type="button" id="searchButton" onclick="search()">Submit</button>
<input type="text" id="stock" value="1301" />
<input type="date" id="startDate" value="2023-01-01" />
<input type="text" id="ma_type" value="sma" />
<input type="number" id="ma_length" value="3" />
<input type="text" id="method" value="method3" />
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://code.highcharts.com/stock/highstock.js"></script>
<script src="https://code.highcharts.com/stock/modules/drag-panes.js"></script>
<script src="https://code.highcharts.com/stock/modules/exporting.js"></script>
<script src="https://code.highcharts.com/stock/modules/accessibility.js"></script>

<div id="container"></div>

<script>
  function search() {
    const stock = document.getElementById("stock").value;
    const startDate = document.getElementById("startDate").value;
    const ma_type = document.getElementById("ma_type").value;
    const ma_length = document.getElementById("ma_length").value;
    const method = document.getElementById("method").value;

    const formData = {};

    formData.stock = stock;
    formData.start_date = startDate;
    formData.ma_type = ma_type;
    formData.ma_length = ma_length;
    formData.method = method;
    console.log(formData);

    $.ajax({
      headers: { "X-CSRFToken": csrf_token },
      type: "GET",
      url: "/ajax_day3/",
      dataType: "json",
      data: formData,
      success: function (response) {
        var support = response.support;
        var resistance = response.resistance;
        var volume = response.volumn;
        var Kline = response.Kline;
        var ma = response.ma;
        var annotations_labels = response.annotations_labels;

        // Check if support2 and resistance2 exist in the response
        var support2 = response.support2 || [];
        var resistance2 = response.resistance2 || [];

        const ohlc = [];
        const volumes = [];
        const supports = [];
        const resistances = [];
        const supports2 = [];
        const resistances2 = [];
        const movingAverage = [];

        for (let i = 0; i < Kline.length; i++) {
          ohlc.push([
            Kline[i][0], // Date
            Kline[i][4], // Open
            Kline[i][2], // High
            Kline[i][3], // Low
            Kline[i][1], // Close
          ]);
        }

        // Prepare the Volume data
        for (let i = 0; i < volume.length; i++) {
          const date = volume[i][0]; // Extract the date from the volume data

          // Find if there is an annotation for this date
          const matchingAnnotation = annotations_labels.find(
            (label) => label.x === date
          );

          // Determine the color based on the annotation's title
          let volumeColor = "grey"; // Default color
          if (matchingAnnotation) {
            if (matchingAnnotation.title === "+") {
              volumeColor = "red";
            } else if (matchingAnnotation.title === "-") {
              volumeColor = "green";
            }
          }
          volumes.push({
            x: date,
            y: volume[i][1],
            color: volumeColor,
          });
        }

        // Prepare the Support and Resistance data
        for (let i = 0; i < support.length; i++) {
          supports.push([support[i][0], support[i][1]]);
          resistances.push([resistance[i][0], resistance[i][1]]);
        }

        // Prepare optional Support2 and Resistance2 data
        for (let i = 0; i < support2.length; i++) {
          supports2.push([support2[i][0], support2[i][1]]);
        }
        for (let i = 0; i < resistance2.length; i++) {
          resistances2.push([resistance2[i][0], resistance2[i][1]]);
        }

        // Prepare Moving Average data
        for (let i = 0; i < ma.length; i++) {
          movingAverage.push([ma[i][0], ma[i][1]]);
          // console.log(`MA Data: Date = ${movingAverage[i][0]}, MA = ${movingAverage[i][1]}`);
        }

        // Plot the data
        Highcharts.stockChart("container", {
          title: {
            text: "Stock Chart with Support, Resistance, and Moving Average",
          },
          rangeSelector: {
            selected: 1,
          },
          yAxis: [
            {
              title: { text: "Price" },
              height: "70%",
              resize: { enabled: true },
            },
            { title: { text: "Volume" }, top: "70%", height: "30%", offset: 0 },
          ],
          series: [
            {
              type: "candlestick",
              name: "Stock",
              data: ohlc,
              yAxis: 0,
              color: "red",
              upColor: "green",
            },
            {
              type: "flags",
              name: "Crossover",
              data: annotations_labels,
              allowOverlapX: !0,
            },
            {
              type: "line",
              name: "Support",
              data: supports,
              color: "blue",
              dashStyle: "ShortDash",
              lineWidth: 1,
              yAxis: 0,
            },
            {
              type: "line",
              name: "Resistance",
              data: resistances,
              color: "orange",
              dashStyle: "ShortDash",
              lineWidth: 1,
              yAxis: 0,
            },
            {
              type: "line",
              name: "Support2",
              data: supports2,
              color: "cyan",
              dashStyle: "Dash",
              lineWidth: 1,
              yAxis: 0,
              visible: support2.length > 0, // Show only if support2 has data
            },
            {
              type: "line",
              name: "Resistance2",
              data: resistances2,
              color: "magenta",
              dashStyle: "Dash",
              lineWidth: 1,
              yAxis: 0,
              visible: resistance2.length > 0, // Show only if resistance2 has data
            },
            {
              type: "line",
              name: "Moving Average",
              data: movingAverage,
              color: "purple",
              dashStyle: "Solid",
              lineWidth: 1,
              yAxis: 0,
            },
            {
              type: "column",
              name: "Volume",
              data: volumes,
              yAxis: 1,
            },
          ],
          tooltip: {
            split: true,
          },
        });
      },
      error: function () {
        alert("Something went wrong.");
      },
    });
  }
</script>
{% endblock %}
