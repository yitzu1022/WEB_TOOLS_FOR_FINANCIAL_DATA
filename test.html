<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摺疊面板範例</title>
    <!-- 引入 Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <!-- 股利法摺疊面板 -->
    <div class="accordion" id="accordionExample">
        <div class="accordion-item">
            <h2 class="accordion-header" id="headingOne">
                <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne" aria-expanded="true" aria-controls="collapseOne">
                    股利法 計算數據
                </button>
            </h2>
            <div id="collapseOne" class="accordion-collapse collapse show" aria-labelledby="headingOne" data-bs-parent="#accordionExample">
                <div class="accordion-body">
                    <p>透過當期股利或歷史平均股利乘上合理的回本時間估算股價。</p>
                    <p>股價 = 平均 10 年股利 × 你所希望的回本期間 (以年為單位)</p>
                    <div class="alert alert-warning">便宜價 = 平均 10 年股利 × 15 年 = 0</div>
                    <div class="alert alert-success">合理價 = 平均 10 年股利 × 20 年 = 0</div>
                    <div class="alert alert-danger">昂貴價 = 平均 10 年股利 × 30 年 = 0</div>
                    <button class="btn btn-primary">確認股票代號後顯示評價</button>
                    <button class="btn btn-secondary">確認股票代號後顯示數據</button>
                </div>
            </div>
        </div>

        <!-- 高低價法摺疊面板 -->
        <div class="accordion-item">
            <h2 class="accordion-header" id="headingTwo">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseTwo" aria-expanded="false" aria-controls="collapseTwo">
                    高低價法 計算數據
                </button>
            </h2>
            <div id="collapseTwo" class="accordion-collapse collapse" aria-labelledby="headingTwo" data-bs-parent="#accordionExample">
                <div class="accordion-body">
                    <p>透過歷史股價的平均估算股價。</p>
                    <p>股價 = 平均 10 年股價</p>
                    <div class="alert alert-warning">便宜價 = 近 10 年每年最低股價平均 = 0</div>
                    <div class="alert alert-success">合理價 = 近 10 年每年平均股價平均 = 0</div>
                    <div class="alert alert-danger">昂貴價 = 近 10 年每年最高股價平均 = 0</div>
                    <button class="btn btn-primary">確認股票代號後顯示評價</button>
                    <button class="btn btn-secondary">確認股票代號後顯示數據</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 引入 Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
