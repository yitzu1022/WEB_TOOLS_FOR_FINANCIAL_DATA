<style>
    body {
    font-family: Arial, sans-serif;
    margin: 0;

    }
    #container_input {
    width: 80%; /* 表單寬度為螢幕寬度的 80% */
    margin: 0 auto; /* 將表單置中 */
    padding: 5px;
    border-bottom: 1px solid #ddd; /* 僅底部加邊框 */

    top: 0;
    left: 0;

    margin-bottom: 20px;
    }

    display: block;
    margin-bottom: 5px;
    font-weight: bold;
    }

    width: 100%;
    padding: 10px;
    margin-bottom: 20px;
    border: 1px solid #ccc;
    border-radius: 5px;
    box-sizing: border-box;
    }
    .row {
    display: flex;
    gap: 20px;
    }
    .row > div {
    flex: 1;
    }
    button:disabled {
    background-color: #ccc;
    }
    /* 添加頁面內容樣式 */

    margin-top: 150px; /* 留出表單的高度空間 */
    padding: 20px;
    }

    #container {
    height: 400px;
    min-width: 310px;
    }

    /* table */
    .table-container {
    margin: 0 auto;
    width: 90%;
    max-width: 1500px;
    background: #fff;
    padding: 20px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);

    #highVolumeTable {
    width: 100%;
    border-collapse: collapse;

    #highVolumeTable th,
    #highVolumeTable td {
    text-align: center;
    padding: 10px;
    }

    #highVolumeTable th {
    background-color: #007bff;

    font-weight: bold;
    }

    #highVolumeTable tr:nth-child(even) {

    }

    #highVolumeTable tr:hover {
    background-color: #eaf4fc;
    cursor: pointer;
    }

    .dataTables_wrapper .dataTables_filter {
    text-align: right;
    margin-bottom: 10px;
    }

    .dataTables_wrapper .dataTables_paginate {
    text-align: right;
    }

    .dataTables_wrapper .dataTables_info {
    margin-top: 10px;

    #submitButton {

<script>
    $(document).ready(function () {
        $(document).ready(function() {
            // Check if data exists in localStorage and populate the form
            if (localStorage.getItem("username") && localStorage.getItem("stockInductor")) {
                $("#stockInductor").val(localStorage.getItem("stockInductor"));
                $("#startDateInductor").val(localStorage.getItem("startDateInductor"));
                $("#endDateInductor").val(localStorage.getItem("endDateInductor"));
                $("#d_num").val(localStorage.getItem("d"));
            }
        });


    $("#example").DataTable({
        responsive: true,
        paging: true,
        searching: true,
        ordering: true,
        info: true,
    });

    $("#addtrackButton").click(function () {
        var user_name_var = 'postgres'
        var stock_inductor_var = document.getElementById("stockInductor").value;
        var start_date_inductor_var = document.getElementById("startDateInductor").value;
        var end_date_inductor_var = document.getElementById("endDateInductor").value;
        var d_var = document.getElementById("d_num").value;
        // console.log(start_date_inductor_var)
        $.ajax({
            headers: { 'X-CSRFToken': csrf_token },
            method: 'POST',
            url: '/day3_3/insert-track-data/',
            dataType: 'json',
            data: {
                'user_name_var': user_name_var,
                'stock_inductor_var': stock_inductor_var,
                'start_date_inductor_var': start_date_inductor_var,
                'end_date_inductor_var': end_date_inductor_var,
                'd_var': d_var
            },
            success: function (response) {
                alert('Add Track sucessfully.')
            },
            error: function () {
                alert('Something went wrong.');
            }
        });
    });


    $("#submitButton").click(function () {
        // 獲取輸入值
        // const stock = $("#stockInductor").val().trim();
        // const startDate = $("#startDateInductor").val();
        // const endDate = $("#endDateInductor").val();
        // const d = parseFloat($("#d_num").val());
        const stock = "AAPL";
        const startDate = "2024-1-1";
        const endDate = "2025-1-10";
        const d = 1;
        //   // 驗證輸入是否有效
        //   if (!stock || !startDate || !endDate || !d) {
        //     $("#result").text("Please fill in all fields");
        //     return;
        //   }

        // 組裝成物件

        const formData = {};
        formData.stock = stock;
        formData.start_date = startDate;
        formData.end_date = endDate;
        formData.d = d;
        console.log(formData);

        $.ajax({
        url: "/day3_3/day3_3_result/",
        method: "GET",
        data: formData,
        success: function (response) {
            console.log("Success");
            var Data = JSON.parse(response);
            var dataObject = {
            Date: [],
            ohlc: [],
            volume: [],
            k: [],
            d: [],
            macd: [],
            macdsignal: [],
            macdhistogram: [],
            upperband: [],
            middleband: [],
            lowerband: [],
            rsi: [],
            adx: [],
            plus_di: [],
            minus_di: [],
            TAS: [],
            TBC: [],
            EveningStar: [],
            MorningStar: [],
            Engufing: [],
            };
            Data.forEach(function (item) {
            dataObject.Date.push(item[0]);
            dataObject.ohlc.push([item[1], item[2], item[3], item[4]]);
            dataObject.volume.push(item[5]);
            dataObject.k.push(item[6]);
            dataObject.d.push(item[7]);
            dataObject.macd.push(item[8]);
            dataObject.macdsignal.push(item[9]);
            dataObject.macdhistogram.push(item[10]);
            dataObject.upperband.push(item[11]);
            dataObject.middleband.push(item[12]);
            dataObject.lowerband.push(item[13]);
            dataObject.rsi.push(item[14]);
            dataObject.adx.push(item[15]);
            dataObject.plus_di.push(item[16]);
            dataObject.minus_di.push(item[17]);
            dataObject.TAS.push(item[18]);
            dataObject.TBC.push(item[19]);
            dataObject.EveningStar.push(item[20]);
            dataObject.MorningStar.push(item[21]);
            dataObject.Engufing.push(item[22]);
            });

            renderGrahic(dataObject);
        },
        error: function (xhr, status, error) {
            console.error("Error:", status, error);
        },
        });
    });
    });
    function renderGrahic(dataObject) {
    renderDataTable(dataObject);
    renderBollingerBands(dataObject);
    renderMACD(dataObject);
    renderRSI(dataObject);
    renderKD(dataObject);
    renderADX_DMI(dataObject);
    renderStar(dataObject);
    renderThree(dataObject);
    renderEngufing(dataObject);
    }
    function renderDataTable(dataObject) {
    // 構建表格數據
    var tableData = [];
    for (var i = 0; i < dataObject.Date.length; i++) {
        tableData.push([
        new Date(dataObject.Date[i]).toLocaleDateString(),
        ...dataObject.ohlc[i],
        dataObject.volume[i],
        dataObject.k[i],
        dataObject.d[i],
        dataObject.macd[i],
        dataObject.macdsignal[i],
        dataObject.macdhistogram[i],
        dataObject.upperband[i],
        dataObject.middleband[i],
        dataObject.lowerband[i],
        dataObject.rsi[i],
        dataObject.adx[i],
        dataObject.plus_di[i],
        dataObject.minus_di[i],
        dataObject.TAS[i],
        dataObject.TBC[i],
        dataObject.EveningStar[i],
        dataObject.MorningStar[i],
        dataObject.Engufing[i],
        ]);
    }
    // 繪製表格
    $("#result").empty();
    $("#result").DataTable({
        responsive: true,
        scrollCollapse: true,
        paging: true, //
        searching: true,
        scrollX: 500,
        ordering: true,
        info: true, // Set default number of rows
        sPaginationType: "full_numbers",
        data: tableData,
        columns: [
        { title: "Date" },
        { title: "Open" },
        { title: "High" },
        { title: "Low" },
        { title: "Close" },
        { title: "Volume" },
        { title: "K" },
        { title: "D" },
        { title: "MACD" },
        { title: "MACD Signal" },
        { title: "MACD Histogram" },
        { title: "Upper Band" },
        { title: "Middle Band" },
        { title: "Lower Band" },
        { title: "RSI" },
        { title: "ADX" },
        { title: "Plus DI" },
        { title: "Minus DI" },
        { title: "TAS" },
        { title: "TBC" },
        { title: "Evening Star" },
        { title: "Morning Star" },
        { title: "Engufing" },
        ],
    });
    }
    function renderBollingerBands(dataObject) {
    // 準備數據
    var ohlc = [];
    var high = [];
    var low = [];
    var middle = [];
    var overBought = [];
    var overSold = [];
    dataObject.Date.forEach(function (item, i) {
        ohlc.push([
        item,
        dataObject.ohlc[i][0],
        dataObject.ohlc[i][1],
        dataObject.ohlc[i][2],
        dataObject.ohlc[i][3],
        ]);
        high.push([item, dataObject.upperband[i]]);
        low.push([item, dataObject.lowerband[i]]);
        middle.push([item, dataObject.middleband[i]]);
        if (dataObject.ohlc[i][3] > dataObject.upperband[i]) {
        if (dataObject.upperband[i] !== null)
            overBought.push([item, dataObject.ohlc[i][3]]);
        }
        if (dataObject.ohlc[i][3] < dataObject.lowerband[i]) {
        if (dataObject.lowerband[i] !== null)
            overSold.push([item, dataObject.ohlc[i][3]]);
        }
    });
    groupingUnits = [
        [
        "week", // unit name
        [1], // allowed multiples
        ],
        ["month", [1, 2, 3, 4, 6]],
    ];

    // create the chart
    Highcharts.stockChart("Historical", {
        rangeSelector: {
        selected: 4,
        },

        title: {
        text: "Historical",
        },

        yAxis: [
        {
            labels: {
            align: "right",
            x: -3,
            },
            title: {
            text: "OHLC",
            },
            height: "80%",
            lineWidth: 2,
            resize: {
            enabled: true,
            },
        },
        //   {
        //     labels: {
        //       align: "right",
        //       x: -3,
        //     },
        //     title: {
        //       text: "Volume",
        //     },
        //     top: "65%",
        //     height: "35%",
        //     offset: 0,
        //     lineWidth: 2,
        //   },
        ],

        tooltip: {
        split: true,
        },

        series: [
        {
            type: "candlestick",
            name: "AAPL",
            data: ohlc,
            dataGrouping: {
            units: groupingUnits,
            },
        },
        //   {
        //     type: "column",
        //     name: "Volume",
        //     data: volume,
        //     yAxis: 1,
        //     dataGrouping: {
        //       units: groupingUnits,
        //     },
        //   },
        {
            type: "line",
            name: "up",
            data: high,
            color: "blue", // 折線圖顏色
            tooltip: {
            valueDecimals: 1, // 小數位數
            },
            dataGrouping: {
            units: groupingUnits,
            },
            //折線圖寬度
            lineWidth: 1,
        },
        {
            type: "line",
            name: "middle",
            data: middle,
            color: "red", // 折線圖顏色
            tooltip: {
            valueDecimals: 1, // 小數位數
            },
            dataGrouping: {
            units: groupingUnits,
            },
            //折線圖寬度
            lineWidth: 1,
        },
        {
            type: "line",
            name: "low",
            data: low,
            color: "green", // 折線圖顏色
            tooltip: {
            valueDecimals: 1, // 小數位數
            },
            dataGrouping: {
            units: groupingUnits,
            },
            //折線圖寬度
            lineWidth: 1,
        },
        {
            type: "flags",
            data: overBought,
            onSeries: "dataseries",
            shape: "circlepin",
            width: 16,
            color: "green",
            fillColor: "rgba(0, 255, 0, 0.3)",
            style: {
            color: "white",
            },
        },
        {
            type: "flags",
            data: overSold,
            onSeries: "dataseries",
            shape: "trianglepin",
            width: 16,
            color: "green",
            fillColor: "rgba(255, 0, 0, 0.3)",
            style: {
            color: "white",
            },
        },
        ],
    });
    }

    // create the chart

        },

        yAxis: [
        {
            labels: {
            align: "right",

            title: {

            },
            height: "80%",

        },

        series: [

            dataGrouping: {

            },
            dataGrouping: {
            units: groupingUnits,
            },
            //折線圖寬度
            lineWidth: 1,
        },
        //   {
        //     type: "flags",
        //     data: overBought,
        //     onSeries: "dataseries",
        //     shape: "circlepin",
        //     width: 16,
        //     color: "green",
        //     fillColor: "rgba(0, 255, 0, 0.3)",
        //     style: {
        //       color: "white",
        //     },
        //   },
        //   {
        //     type: "flags",
        //     data: overSold,
        //     onSeries: "dataseries",
        //     shape: "trianglepin",
        //     width: 16,
        //     color: "green",
        //     fillColor: "rgba(255, 0, 0, 0.3)",
        //     style: {
        //       color: "white",
        //     },
        //   },
        ],
    });
    }
    function renderRSI(dataObject) {
    // 準備數據
    var ohlc = [];
    var RSI = [];
    var overBought = [];
    var overSold = [];
    var overBoughtSignal = [];
    var overSoldSignal = [];
    dataObject.Date.forEach(function (item, i) {
        ohlc.push([
        item,
        dataObject.ohlc[i][0],
        dataObject.ohlc[i][1],
        dataObject.ohlc[i][2],
        dataObject.ohlc[i][3],
        ]);
        RSI.push([item, dataObject.rsi[i]]);
        overBought.push([item, 70]);
        overSold.push([item, 30]);
        if (dataObject.rsi[i] > 70) {
        overBoughtSignal.push([item, dataObject.rsi[i]]);
        }
        if (dataObject.rsi[i] < 30) {
        overSoldSignal.push([item, dataObject.rsi[i]]);
        }
    });
    groupingUnits = [
        [
        "week", // unit name
        [1], // allowed multiples
        ],
        ["month", [1, 2, 3, 4, 6]],
    ];
    // create the chart
    Highcharts.stockChart("RSI", {
        rangeSelector: {
        selected: 4,
        },

        title: {
        text: "RSI",
        },

        yAxis: [
        {
            labels: {
            align: "right",
            x: -3,
            },
            title: {
            text: "OHLC",
            },
            height: "60%",
            lineWidth: 2,
            resize: {
            enabled: true,
            },
        },
        {
            labels: {
            align: "right",
            x: -3,
            },
            title: {
            text: "RSI",
            },
            top: "65%",
            height: "35%",
            offset: 2,
            lineWidth: 2,
        },
        ],

        tooltip: {
        split: true,
        },

        series: [
        {
            type: "candlestick",
            name: "AAPL",
            data: ohlc,
            dataGrouping: {
            units: groupingUnits,
            },
        },
        {
            type: "line",
            name: "RSI",
            data: RSI,
            yAxis: 1,
            dataGrouping: {
            units: groupingUnits,
            },
        },
        {
            type: "line",
            name: "overbought",
            data: overBought,
            dashStyle: "dash",
            yAxis: 1,
            dataGrouping: {
            units: groupingUnits,
            },
        },
        {
            type: "line",
            name: "oversold",
            data: overSold,
            dashStyle: "dash",
            yAxis: 1,
            dataGrouping: {
            units: groupingUnits,
            },
        },
        {
            type: "flags",
            name: "overbought",
            data: overBoughtSignal,
            yAxis: 1,
            dataGrouping: {
            units: groupingUnits,
            },
        },
        {
            type: "flags",
            name: "oversold",
            data: overSoldSignal,
            yAxis: 1,
            dataGrouping: {
            units: groupingUnits,
            },
        },
        ],
    });
    }
    function renderKD(dataObject) {
    // 準備數據
    var k = [];
    var d = [];
    var overBought = [];
    var overSold = [];
    var overBoughtSignal = [];
    var overSoldSignal = [];
    dataObject.Date.forEach(function (item, i) {
        k.push([item, dataObject.k[i]]);
        d.push([item, dataObject.d[i]]);
        overBought.push([item, 80]);
        overSold.push([item, 20]);
        if (dataObject.k[i] > 80 && dataObject.d[i] > 80) {
        overBoughtSignal.push([item, dataObject.k[i]]);
        }
        if (dataObject.k[i] < 20 && dataObject.d[i] < 20) {
        overSoldSignal.push([item, dataObject.d[i]]);
        }
    });
    groupingUnits = [
        [
        "week", // unit name
